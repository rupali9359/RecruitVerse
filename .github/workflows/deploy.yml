name: RecruitVerse CI

on:
  push:
    branches:
      - main
      - Day/21-30

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: recruiters
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d recruiters"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: ci
      APP_NAME: RecruitVerse
      DEBUG: false
      API_VERSION: v1
      LOG_LEVEL: INFO
      RATE_LIMIT: 20/minute

      DB_NAME: recruiters
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

      SECRET_KEY: github-actions-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Initialize database tables
        run: |
          python - <<'PY'
          from src.api.database import get_connection

          conn = get_connection()
          cursor = conn.cursor()

          cursor.execute("""
          CREATE TABLE IF NOT EXISTS users (
              id SERIAL PRIMARY KEY,
              username VARCHAR(100) UNIQUE,
              email VARCHAR(200) UNIQUE,
              password_hash TEXT,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          """)

          cursor.execute("""
          CREATE TABLE IF NOT EXISTS semantic_searches (
              id SERIAL PRIMARY KEY,
              query TEXT,
              searched_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          """)

          cursor.execute("""
          CREATE TABLE IF NOT EXISTS recruiter_notes (
              id SERIAL PRIMARY KEY,
              resume_name TEXT,
              note TEXT,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          """)

          cursor.execute("""
          CREATE TABLE IF NOT EXISTS interviews (
              id SERIAL PRIMARY KEY,
              candidate_name TEXT,
              interview_date DATE,
              status VARCHAR(50),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          """)

          conn.commit()
          cursor.close()
          conn.close()

          print("Database initialized successfully")
          PY

      - name: Run tests
        run: |
          python -m pytest -q
          