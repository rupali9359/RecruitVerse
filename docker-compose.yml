version: "3.9"

services:
  recruitverse:
    build: .
    container_name: recruitverse_app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: recruiters
      DB_USER: postgres
      DB_PASSWORD: root123
      DATABASE_URL: postgresql://postgres:root123@postgres:5432/recruiters
      SKILLS_FILE: data/skills_dictionary/skills_dictionary.json
      RAW_RESUME_DIR: data/raw_resumes
      PARSED_RESUME_DIR: data/parsed_resumes
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: recruitverse_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: recruiters
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recruiters"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: